name: CI

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Run rustfmt
        run: cargo fmt -- --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable with llvm-tools-preview
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
      - name: Build Debug
        run: cargo build --verbose
      - name: Build Release
        run: cargo build --release --verbose
      - name: Run Tests
        run: cargo test --verbose
      - name: E2E Test
        run: |
          # Add the release directory to PATH
          export PATH=$PATH:$(pwd)/target/release
          # Some documentation assumes 'covopt' is the executable name
          ln -s $(pwd)/target/release/CovOpt-Analyzer $(pwd)/target/release/covopt || true
          
          # Create a dummy crate
          cargo new dummy_crate
          cd dummy_crate
          cat << 'EOF' > src/lib.rs
          #[inline(never)]
          pub fn process_data(n: usize) {
              let mut sum = 0;
              for i in 0..n {
                  sum += std::hint::black_box(i);
              }
              std::hint::black_box(sum);
          }

          #[cfg(test)]
          mod tests {
              use super::*;
              #[test]
              fn test_process_complexity() {
                  let n: usize = std::env::var("COVOPT_N")
                      .unwrap_or_else(|_| "10".to_string())
                      .parse()
                      .unwrap();
                  process_data(n);
              }
          }
          EOF
          
          # Run the analyzer
          covopt --test test_process_complexity --expected ON --n-values "1000,5000,10000" --target-file src/lib.rs --target-line 5

  release:
    name: Build & Upload Release
    runs-on: ubuntu-latest
    needs: [lint, build-test]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Build Release
        run: cargo build --release
      - name: Upload Binary
        uses: softprops/action-gh-release@v1
        with:
          files: target/release/CovOpt-Analyzer
